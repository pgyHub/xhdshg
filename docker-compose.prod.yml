services:
  db:
    image: postgres:16-alpine
    container_name: xhdshg-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xhdshg}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xhdshg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xhdshg-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-xhdshg}
      SECRET_KEY: ${SECRET_KEY:?set-in-env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: xhdshg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
  uploads_data:
